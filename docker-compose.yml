# One CRM — one container. Secrets stay in env file (never commit).
#
#   cp Backend/.env.production.example prod.env   # fill values
#   ENV_FILE=./prod.env docker compose up -d --build

services:
  onecrm:
    build:
      context: .
      args:
        BACKEND_INTERNAL_URL: http://127.0.0.1:4000
    image: ${IMAGE_NAME:-onecrm}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-onecrm}
    env_file:
      - ${ENV_FILE:-./Backend/.env}
    environment:
      NODE_ENV: production
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      BACKEND_PORT: ${BACKEND_PORT:-4000}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      # Public app port only; API is proxied inside the container.
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    restart: unless-stopped
